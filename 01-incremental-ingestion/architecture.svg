<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2E75B6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#F8FAFB" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="600" fill="#1F4E79">Incremental Data Ingestion Pipeline — Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#888888">Microsoft Fabric · Azure SQL · Delta Lake · PySpark</text>

  <!-- Section labels -->
  <text x="110" y="90" text-anchor="middle" font-size="12" fill="#888888" font-weight="500">SOURCE</text>
  <text x="450" y="90" text-anchor="middle" font-size="12" fill="#888888" font-weight="500">FABRIC DATA FACTORY PIPELINE</text>
  <text x="790" y="90" text-anchor="middle" font-size="12" fill="#888888" font-weight="500">DESTINATION</text>

  <!-- Section dividers -->
  <line x1="240" y1="75" x2="240" y2="460" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="660" y1="75" x2="660" y2="460" stroke="#DDDDDD" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ── SOURCE: Azure SQL ───────────────────────────── -->
  <rect x="30" y="105" width="160" height="70" rx="8" fill="#E6F1FB" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="110" y="131" text-anchor="middle" font-size="13" font-weight="600" fill="#1F4E79">Azure SQL DB</text>
  <text x="110" y="151" text-anchor="middle" font-size="11" fill="#2E75B6">dbo.ShipmentLogs</text>
  <text x="110" y="167" text-anchor="middle" font-size="11" fill="#2E75B6">580 rows · indexed</text>

  <!-- SOURCE: Watermark control -->
  <rect x="30" y="210" width="160" height="60" rx="8" fill="#F1EFE8" stroke="#888888" stroke-width="1.5"/>
  <text x="110" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Lakehouse</text>
  <text x="110" y="252" text-anchor="middle" font-size="11" fill="#5F5E5A">watermark_control</text>
  <text x="110" y="266" text-anchor="middle" font-size="10" fill="#888888">Delta table</text>

  <!-- ── PIPELINE: Lookup ───────────────────────────── -->
  <rect x="268" y="100" width="160" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="348" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">ACTIVITY 1</text>
  <text x="348" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Lookup</text>
  <text x="348" y="161" text-anchor="middle" font-size="11" fill="#0F6E56">Reads old watermark</text>
  <text x="348" y="175" text-anchor="middle" font-size="10" fill="#1D9E75">LastWatermarkDate</text>

  <!-- ── PIPELINE: Copy ─────────────────────────────── -->
  <rect x="460" y="100" width="160" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="540" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">ACTIVITY 2</text>
  <text x="540" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Copy Activity</text>
  <text x="540" y="161" text-anchor="middle" font-size="11" fill="#0F6E56">WHERE modified_date</text>
  <text x="540" y="175" text-anchor="middle" font-size="10" fill="#1D9E75">> old watermark</text>

  <!-- ── PIPELINE: Staging ──────────────────────────── -->
  <rect x="460" y="230" width="160" height="60" rx="8" fill="#F1EFE8" stroke="#888888" stroke-width="1.5"/>
  <text x="540" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Staging (Files)</text>
  <text x="540" y="272" text-anchor="middle" font-size="11" fill="#5F5E5A">Parquet · temp zone</text>
  <text x="540" y="286" text-anchor="middle" font-size="10" fill="#888888">Files/staging/shipment_delta</text>

  <!-- ── PIPELINE: Notebook ─────────────────────────── -->
  <rect x="268" y="270" width="160" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="348" y="293" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C">ACTIVITY 3</text>
  <text x="348" y="313" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">PySpark Notebook</text>
  <text x="348" y="331" text-anchor="middle" font-size="11" fill="#534AB7">Quality checks</text>
  <text x="348" y="347" text-anchor="middle" font-size="11" fill="#534AB7">MERGE + watermark</text>

  <!-- ── DESTINATION: Silver table ─────────────────── -->
  <rect x="690" y="200" width="170" height="80" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="775" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">ShipmentLogs_Silver</text>
  <text x="775" y="245" text-anchor="middle" font-size="11" fill="#3B6D11">Delta Lake table</text>
  <text x="775" y="261" text-anchor="middle" font-size="11" fill="#3B6D11">ACID · versioned</text>
  <text x="775" y="275" text-anchor="middle" font-size="10" fill="#639922">580 rows after Day 2 run</text>

  <!-- ── ARROWS ─────────────────────────────────────── -->

  <!-- SQL → Lookup -->
  <line x1="190" y1="140" x2="265" y2="140" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Watermark → Lookup -->
  <path d="M110 210 L110 195 L260 195 L260 152 L265 152" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>

  <!-- Lookup → Copy -->
  <line x1="428" y1="140" x2="458" y2="140" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Copy → Staging -->
  <line x1="540" y1="180" x2="540" y2="228" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Staging → Notebook -->
  <path d="M460 260 L348 260 L348 268" fill="none" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Notebook → Silver -->
  <path d="M428 315 L660 315 L660 240 L688 240" fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Notebook updates watermark (dashed loop) -->
  <path d="M268 345 L190 345 L190 270" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>

  <!-- Arrow labels -->
  <rect x="195" y="130" width="66" height="18" rx="3" fill="#F8FAFB"/>
  <text x="228" y="143" text-anchor="middle" font-size="10" fill="#888888">data flow</text>

  <rect x="180" y="282" width="82" height="18" rx="3" fill="#F8FAFB"/>
  <text x="222" y="295" text-anchor="middle" font-size="10" fill="#888888">updates watermark</text>

  <!-- ── LEGEND ─────────────────────────────────────── -->
  <rect x="30" y="390" width="220" height="72" rx="6" fill="white" stroke="#DDDDDD" stroke-width="1"/>
  <text x="44" y="410" font-size="11" font-weight="600" fill="#444441">Legend</text>
  <line x1="44" y1="425" x2="80" y2="425" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="88" y="429" font-size="11" fill="#666666">Data flow</text>
  <line x1="44" y1="445" x2="80" y2="445" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>
  <text x="88" y="449" font-size="11" fill="#666666">Control / staging flow</text>

  <!-- ── RESULTS BOX ─────────────────────────────────── -->
  <rect x="670" y="320" width="200" height="110" rx="6" fill="white" stroke="#3B6D11" stroke-width="1"/>
  <text x="770" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#173404">Results</text>
  <text x="684" y="362" font-size="11" fill="#3B6D11">Day 1:  500 rows (full load)</text>
  <text x="684" y="380" font-size="11" fill="#3B6D11">Day 2:  115 rows (delta only)</text>
  <text x="684" y="398" font-size="11" fill="#3B6D11">Total:  580 rows in Silver</text>
  <text x="684" y="416" font-size="11" fill="#3B6D11">Runtime: 22 min (was 6h 14m)</text>

</svg>
